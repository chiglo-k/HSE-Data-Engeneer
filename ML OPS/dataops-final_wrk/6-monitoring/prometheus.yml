global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ml_service"
    static_configs:
      # ML-сервис доступен через общую Docker-сеть «monitoring»
      - targets: ["ml_service:8080"]
    metrics_path: /metrics
    scrape_interval: 10s
