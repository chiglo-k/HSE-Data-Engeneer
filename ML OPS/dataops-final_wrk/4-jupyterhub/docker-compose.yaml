version: "3.9"

services:
  jupyterhub:
    build: .
    container_name: jupyterhub
    restart: unless-stopped
    env_file: .env
    environment:
      JUPYTERHUB_DATA_DIR: /data
    ports:
      - "8002:8000"
    volumes:
      - jupyterhub_data:/data
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro

volumes:
  jupyterhub_data:
