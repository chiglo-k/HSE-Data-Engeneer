version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: mlservice_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build: .
    container_name: ml_service
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MODEL_VERSION: ${MODEL_VERSION}
    ports:
      - "8004:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - monitoring

volumes:
  postgres_data:

networks:
  monitoring:
    name: monitoring
    external: true
